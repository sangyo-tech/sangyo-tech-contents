name: Bump unav.js version to v40
on: workflow_dispatch

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace v38 v39 v34 with v40
        run: |
          find . -name '*.html' -exec sed -i 's|unav\.js?v=3[489]|unav.js?v=40|g' {} +
      - name: Commit changes
        run: |
          git config user.name "sangyo-tech"
          git config user.email "noreply@sangyo-tech.jp"
          git add -A
          git diff --cached --quiet || git commit -m "chore: bump unav.js cache version to v40"
          git push
